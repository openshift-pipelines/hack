---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: multikueue-setup
spec:
  params:
    - name: CATALOG_SOURCE
      description: Provide catalog-source name through which user have to subscribe operator
      default: redhat-operators
    - name: IMAGE
      default: quay.io/openshift-pipeline/ci
    - name: OSP_INDEX_IMAGE
      default: "quay.io/openshift-pipeline/pipelines-index-4.20:v1.22.0"
    - name: KUEBECONFIG_SECRET
      type: string
    - name: MULTI_CLUSTER_ROLE
      default: Spoke
    - name: KUEUE_NAMESPACE
      default: openshift-kueue-operator
    - name: CERT_MANAGER_NAMESPACE
      default: cert-manager-operator
  volumes:
    - name: kubeconfig
      secret:
        secretName: $(params.KUEBECONFIG_SECRET)
  stepTemplate:
    image: $(params.IMAGE)
    volumeMounts:
      - name: kubeconfig
        mountPath: /credentials
    env:
      - name: KUEUE_NAMESPACE
        value: $(params.KUEUE_NAMESPACE)
      - name: CERT_MANAGER_NAMESPACE
        value: $(params.CERT_MANAGER_NAMESPACE)
      - name: KUBECONFIG
        value: /credentials/kubeconfig
      - name: CATALOG_SOURCE
        value: $(params.CATALOG_SOURCE)
  steps:
    - name: create-namespace
      script: |
        oc create ns $KUEUE_NAMESPACE --dry-run=client -o yaml | oc apply -f -
        oc create ns $CERT_MANAGER_NAMESPACE --dry-run=client -o yaml | oc apply -f -
    - name: create-kueue-operator-group
      script: |
        set -x
        if ! oc get operatorgroup -n "$KUEUE_NAMESPACE" --no-headers | grep -q "$KUEUE_NAMESPACE"; then
          echo "OperatorGroup not found. Creating..."
          cat <<EOF | oc apply -f -
          apiVersion: operators.coreos.com/v1
          kind: OperatorGroup
          metadata:
            name: "$KUEUE_NAMESPACE"
            namespace: "$KUEUE_NAMESPACE"
          spec: {}
        EOF
        else
          echo "OperatorGroup already exists in $KUEUE_NAMESPACE. Skipping."
        fi
    - name: create-cert-operator-group
      script: |
        set -x
        if ! oc get operatorgroup -n "$CERT_MANAGER_NAMESPACE" --no-headers | grep -q "$CERT_MANAGER_NAMESPACE"; then
          echo "OperatorGroup not found. Creating..."
          cat <<EOF | oc apply -f -
          apiVersion: operators.coreos.com/v1
          kind: OperatorGroup
          metadata:
            name: "$CERT_MANAGER_NAMESPACE"
            namespace: "$CERT_MANAGER_NAMESPACE"
          spec: {}
        EOF
        else
          echo "OperatorGroup already exists in $CERT_MANAGER_NAMESPACE. Skipping."
        fi
    - name: install-cert-manager
      script: |
        cat << EOF | oc apply -f -
        apiVersion: operators.coreos.com/v1alpha1
        kind: Subscription
        metadata:
          name: openshift-cert-manager-operator
          namespace: cert-manager-operator
        spec:
          config:
            env:
            - name: ROLEARN
              value: test
          channel: stable-v1
          installPlanApproval: Automatic
          name: openshift-cert-manager-operator
          source: redhat-operators
          sourceNamespace: openshift-marketplace
        EOF
    - name: install-rhbok-operator
      script: |
        cat << EOF | oc apply -f -
        apiVersion: operators.coreos.com/v1alpha1
        kind: Subscription
        metadata:
          name: kueue-operator-stable-v1.3
          namespace: $KUEUE_NAMESPACE
        spec:
          channel: stable-v1.3
          installPlanApproval: Automatic
          name: kueue-operator
          source: redhat-operators
          sourceNamespace: openshift-marketplace
        EOF
    - name: create-osp-catalog
      env:
        - name: INDEX_IMAGE
          value: "$(params.OSP_INDEX_IMAGE)"
      script: |
        #!/usr/bin/env bash
        cat <<EOF | oc apply -f-
          apiVersion: operators.coreos.com/v1alpha1
          kind: CatalogSource
          metadata:
            name: "custom-osp-operator"
            namespace: openshift-marketplace
          spec:
            sourceType: grpc
            image: $INDEX_IMAGE
            displayName: "Custom OSP"
            publisher: Red Hat
            updateStrategy:
            registryPoll:
            interval: 30m
        EOF

    - name: install-pipelines-operator
      script: |
        cat <<EOF | oc apply -f-
        apiVersion: operators.coreos.com/v1alpha1
        kind: Subscription
        metadata:
          name: openshift-pipelines-operator-rh
          namespace: openshift-operators
        spec:
          name: openshift-pipelines-operator-rh
          source: "custom-osp-operator"
          sourceNamespace: openshift-marketplace
          channel: latest
        EOF
    - name: wait-for-rhbok-pods
      script: |
        #!/usr/bin/env bash
        kubectl -n $KUEUE_NAMESPACE get  po
        kubectl wait --for=condition=Available deployment --all -n $KUEUE_NAMESPACE --timeout=300s

    - name: create-kueue-cr
      script: |
        cat << EOF | kubectl apply -f -
        apiVersion: kueue.openshift.io/v1
        kind: Kueue
        metadata:
          name: cluster
        spec:
          config:
            integrations:
              externalFrameworks:
              - group: tekton.dev
                resource: pipelineruns
                version: v1
              frameworks:
              - BatchJob
              - Pod
              - Deployment
            multiKueue:
              externalFrameworks:
              - group: tekton.dev
                resource: pipelineruns
                version: v1
          logLevel: Normal
          managementState: Managed
          operatorLogLevel: Normal
        EOF
    - name: wait-for-tekton-config
      script: |
        #!/usr/bin/env bash
        oc get tektonconfig config
        PHASE=$(oc get tektonconfig config -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
        elapsed=0
        timeout=1800  # 30 minutes
        while [ "$PHASE" != "True" ];
        do
        oc get tektonconfig config
        oc get po -n openshift-pipelines
        
        # Check pod status for actual error states only (exclude normal transitional states)
        error_pods=$(oc get po -n openshift-pipelines --no-headers | grep -E "(Error|Failed|CrashLoopBackOff|ImagePullBackOff|ErrImagePull|InvalidImageName|CreateContainerConfigError|CreateContainerError|OOMKilled|Evicted)" || true)
        if [ -n "$error_pods" ]; then
          echo "Error: Pods in failed state detected:"
          echo "$error_pods"
          echo ""
          # Show actual error messages for each failed pod
          while IFS= read -r pod_line; do
            if [ -n "$pod_line" ]; then
              pod_name=$(echo "$pod_line" | tr -s ' ' | cut -d' ' -f1)
              echo "Error for pod $pod_name:"
              # Get the actual error message from events
              oc describe pod "$pod_name" -n openshift-pipelines | grep -E "(Failed|Error|Warning)" | tail -3 || echo "No specific error found"
              echo ""
            fi
          done <<< "$error_pods"
          echo "TektonConfig installation failed due to pod errors"
          exit 1
        fi
        
        sleep 30
        elapsed=$((elapsed + 30))
        if [ $elapsed -ge $timeout ]; then
          echo "Timeout: TektonConfig not ready after 30 minutes"
          echo "TektonConfig status:"
          oc get tektonconfig config || echo "Failed to get TektonConfig"
          echo "Pods:"
          oc get po -n openshift-pipelines || echo "Failed to get pods"
          exit 1
        fi
        PHASE=$(oc get tektonconfig config -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
        done
        
        echo "✅ TektonConfig is ready!"
        oc get tektonconfig config

    - name: configure-network-policy-egress
      script: |
        cat <<EOF | kubectl apply -f -
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: kueue-allow-egress-external
          namespace: $KUEUE_NAMESPACE
        spec:
          podSelector:
            matchLabels:
              app.openshift.io/name: kueue
          policyTypes:
            - Egress
          egress:
            - ports:
                - port: 443
                  protocol: TCP
                - port: 80
                  protocol: TCP
        EOF

    - name: enable-multi-cluster
      script: |
        set -x
        kubectl patch tektonconfig config --type='merge' -p '
        {
          "spec": {
            "scheduler": {
              "disabled": false,
              "multi-cluster-disabled": false,
              "multi-cluster-role": "$(params.MULTI_CLUSTER_ROLE)"
            }
          }
        }'



