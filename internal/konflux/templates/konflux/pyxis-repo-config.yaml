repositories:
  - image_type: Layered
    base_rhel_version: {{.Application.Release.ImageSuffix | trimPrefix "-"}}
    repository:
      repository: {{.Application.Config.Product}}/{{.Image}}
      release_categories:
        - Generally Available
      includes_multiple_content_streams: false
      content_stream_tags:
        - latest
      build_categories:
        - Standalone image
      team_id: 5dea5deddd19c71643b82455
      display_data:
        name: {{.Image}}
        long_description: container image for {{.Application.Config.Product}} {{.Name }} Component
      entitlement_enabled: false
      engineering_ids:
        - "604"
      vendor_label: redhat
      application_categories:
        - Other
      privileged_images_allowed: false
      documentation_links:
        - title: {{.Name }}
          type: Readme
          url: {{ .Repository.Url}}
      contacts:
        - email_address: prbindal@redhat.com
          type: Image Owner
      use_latest: true
      requires_terms: true
